<h1>personal portfolio</h1>
<p id="stuff">computer science solutions</p>
<p id="things">digital art</p>
<p id="stuff">other art</p>
<p id="things">games</p>
<p id="stuff">writing</p>
<p id="things">apps</p>
<p id="stuff">resume</p>
<canvas id="dragonCanvas" width="800" height="600"></canvas>

<script>
    const stuffParagraphs = document.querySelectorAll("#stuff");
    const thingsParagraphs = document.querySelectorAll("#things");

    let iteration = 0;

    function swapContents() {
      for (let i = 0; i < stuffParagraphs.length; i++) {
        const temp = stuffParagraphs[i].textContent;
        stuffParagraphs[i].textContent = thingsParagraphs[i].textContent;
        thingsParagraphs[i].textContent = temp;
      }
      iteration++;
      console.log(`Iteration ${iteration}`);
    }

    // Swap contents every 1000ms (1 second)
    setInterval(swapContents, 1000);

  
    const canvas = document.getElementById("dragonCanvas");
    const ctx = canvas.getContext("2d");

    const startX = 100;
    const startY = 200;
    const length = 300;
    const iterations = 12;

    canvas.width = length + startX * 2;
    canvas.height = length + startY * 2;

    const dragonCurve = (directions, iterations) => {
      if (iterations === 0) return directions;

      const newDirections = directions.slice();
      newDirections.push(1);

      for (let i = directions.length - 1; i >= 0; i--) {
        newDirections.push(-directions[i]);
      }

      return dragonCurve(newDirections, iterations - 1);
    };

    const drawDragonCurve = (directions) => {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      let x = startX;
      let y = startY;
      ctx.beginPath();
      ctx.moveTo(x, y);

      for (const direction of directions) {
        if (direction === 1) {
          x += length * Math.cos(Math.PI / 4);
          y -= length * Math.sin(Math.PI / 4);
        } else {
          x += length * Math.cos(3 * Math.PI / 4);
          y += length * Math.sin(3 * Math.PI / 4);
        }

        ctx.lineTo(x, y);
      }

      ctx.stroke();
    };

    const dragonDirections = dragonCurve([1], iterations);
    drawDragonCurve(dragonDirections);
  
<link></link>
</body>
</html>
